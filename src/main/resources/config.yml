world:
  name: OGOBworld
  slot-size: 256
  center-y: 80

npc:
  name: "<gold><bold>OG OneBlock"
  subtitle: "<gray>Left-click to enter hard mode"
  entity-type: VILLAGER
  location: ""

gameplay:
  # Commands players may use while in OGOBworld. Command labels are lowercase
  # and do not include the slash.
  allowed-commands:
    - spawn
    - msg
    - tell
    - w
    - r
    - help
    - tag
    - tags
    - ogprestige
    - ogp
    # Two-word entries match "command + first arg", so this allows /ob setspawn
    # without unlocking the rest of /ob.
    - "ob setspawn"
    # xPets — full pet UX usable inside OG. Admin-only /petadmin is gated by
    # its own permission and players with ogoneblock.command.bypass anyway.
    - pet
    - pets
    - petability
    - pettrade
    - petarena
    - petrankings
    - pethelp

